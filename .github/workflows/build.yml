name: Build TrollMusicApp V2.1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Full IPA
    runs-on: macos-latest

    steps:
      - name: Setup Folders
        run: |
          mkdir -p TrollMusicApp/TrollMusicApp

      - name: Write Main App Code
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/TrollMusicAppApp.swift
          import SwiftUI
          import AVFoundation

          @main
          struct TrollMusicAppApp: App {
              init() { setupAudioSession() }
              var body: some Scene {
                  WindowGroup {
                      MainTabView().environmentObject(MusicManager.shared)
                  }
              }
              func setupAudioSession() {
                  do {
                      try AVAudioSession.sharedInstance().setCategory(.playback, mode: .default, options: [])
                      try AVAudioSession.sharedInstance().setActive(true)
                  } catch { print("Audio Error") }
              }
          }
          EOF

      - name: Write Music Manager Code
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/MusicManager.swift
          import Foundation
          import AVFoundation
          import MediaPlayer

          class MusicManager: NSObject, ObservableObject, AVAudioPlayerDelegate {
              static let shared = MusicManager()
              @Published var songs: [Song] = []
              @Published var playlists: [Playlist] = []
              @Published var currentSong: Song?
              @Published var isPlaying: Bool = false
              @Published var isShuffle: Bool = false
              var audioPlayer: AVAudioPlayer?
              
              let fileManager = FileManager.default
              var documentsDirectory: URL { fileManager.urls(for: .documentDirectory, in: .userDomainMask)[0] }
              
              override init() {
                  super.init()
                  loadSongs()
                  loadPlaylists()
                  setupRemoteCommandCenter()
              }
              
              func loadSongs() {
                  do {
                      let files = try fileManager.contentsOfDirectory(at: documentsDirectory, includingPropertiesForKeys: nil)
                      let audioFiles = files.filter { ["mp3", "m4a", "wav"].contains($0.pathExtension.lowercased()) }
                      songs = audioFiles.map { url in Song(id: UUID(), title: url.deletingPathExtension().lastPathComponent, url: url) }.sorted { $0.title < $1.title }
                  } catch {}
              }
              
              func deleteSong(_ song: Song) {
                  try? fileManager.removeItem(at: song.url)
                  loadSongs()
              }
              
              func createPlaylist(name: String) {
                  playlists.append(Playlist(id: UUID(), name: name, songIDs: []))
                  savePlaylists()
              }
              
              func addSongToPlaylist(song: Song, playlist: Playlist) {
                  if let index = playlists.firstIndex(where: { $0.id == playlist.id }) {
                      if !playlists[index].songIDs.contains(song.id) { playlists[index].songIDs.append(song.id); savePlaylists() }
                  }
              }
              
              func savePlaylists() {
                  if let encoded = try? JSONEncoder().encode(playlists) { UserDefaults.standard.set(encoded, forKey: "savedPlaylists") }
              }
              
              func loadPlaylists() {
                  if let data = UserDefaults.standard.data(forKey: "savedPlaylists"), let decoded = try? JSONDecoder().decode([Playlist].self, from: data) { playlists = decoded }
              }
              
              func playSong(_ song: Song) {
                  do {
                      audioPlayer = try AVAudioPlayer(contentsOf: song.url)
                      audioPlayer?.delegate = self
                      audioPlayer?.play()
                      currentSong = song
                      isPlaying = true
                      updateNowPlayingInfo()
                  } catch {}
              }
              
              func togglePlayPause() {
                  if isPlaying {
                      audioPlayer?.pause()
                  } else {
                      audioPlayer?.play()
                  }
                  isPlaying.toggle()
                  updateNowPlayingInfo()
              }
              
              func playNext() {
                  guard !songs.isEmpty else { return }
                  if isShuffle {
                      if let randomSong = songs.randomElement() { playSong(randomSong) }
                  } else {
                      guard let current = currentSong, let index = songs.firstIndex(of: current) else { return }
                      let nextIndex = (index + 1) % songs.count
                      playSong(songs[nextIndex])
                  }
              }
              
              func playPrevious() {
                  guard !songs.isEmpty else { return }
                  if isShuffle {
                      if let randomSong = songs.randomElement() { playSong(randomSong) }
                  } else {
                      guard let current = currentSong, let index = songs.firstIndex(of: current) else { return }
                      let prevIndex = (index - 1 + songs.count) % songs.count
                      playSong(songs[prevIndex])
                  }
              }
              
              func audioPlayerDidFinishPlaying(_ player: AVAudioPlayer, successfully flag: Bool) {
                  playNext()
              }
              
              func setupRemoteCommandCenter() {
                  let commandCenter = MPRemoteCommandCenter.shared()
                  commandCenter.playCommand.addTarget { [weak self] _ in
                      guard let self = self else { return .commandFailed }
                      if self.isPlaying { return .commandFailed }
                      self.togglePlayPause()
                      return .success
                  }
                  commandCenter.pauseCommand.addTarget { [weak self] _ in
                      guard let self = self else { return .commandFailed }
                      if !self.isPlaying { return .commandFailed }
                      self.togglePlayPause()
                      return .success
                  }
                  commandCenter.nextTrackCommand.addTarget { [weak self] _ in
                      self?.playNext()
                      return .success
                  }
                  commandCenter.previousTrackCommand.addTarget { [weak self] _ in
                      self?.playPrevious()
                      return .success
                  }
              }
              
              func updateNowPlayingInfo() {
                  guard let currentSong = currentSong else { return }
                  MPNowPlayingInfoCenter.default().nowPlayingInfo = [MPMediaItemPropertyTitle: currentSong.title, MPMediaItemPropertyArtist: "Ahmed's Music"]
              }
          }

          struct Song: Identifiable, Codable, Equatable { var id: UUID; var title: String; var url: URL }
          struct Playlist: Identifiable, Codable { var id: UUID; var name: String; var songIDs: [UUID] }
          EOF

      - name: Write Web Browser Logic
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/WebBrowser.swift
          import SwiftUI
          import WebKit

          class WebViewModel: ObservableObject {
              @Published var canGoBack: Bool = false
              @Published var canGoForward: Bool = false
              @Published var showDownloadAlert: Bool = false
              @Published var downloadFileName: String = ""
              
              var webView: WKWebView = {
                  let prefs = WKWebpagePreferences()
                  prefs.allowsContentJavaScript = true
                  let config = WKWebViewConfiguration()
                  config.defaultWebpagePreferences = prefs
                  config.allowsInlineMediaPlayback = true
                  return WKWebView(frame: .zero, configuration: config)
              }()
              
              func goBack() { webView.goBack() }
              func goForward() { webView.goForward() }
              func refresh() { webView.reload() }
              func loadUrl(_ urlString: String) {
                  var finalStr = urlString
                  if !finalStr.hasPrefix("http") { finalStr = "https://" + finalStr }
                  if let url = URL(string: finalStr) { webView.load(URLRequest(url: url)) }
              }
              
              func grabAudio() {
                  webView.evaluateJavaScript("document.querySelector('audio')?.src || document.querySelector('video')?.src") { result, error in
                      if let mediaUrlString = result as? String, let url = URL(string: mediaUrlString) {
                          let task = URLSession.shared.downloadTask(with: url) { localUrl, response, _ in
                              guard let localUrl = localUrl else { return }
                              let fm = FileManager.default
                              let dest = fm.urls(for: .documentDirectory, in: .userDomainMask)[0].appendingPathComponent("CapturedAudio_\(UUID().uuidString.prefix(4)).mp3")
                              try? fm.moveItem(at: localUrl, to: dest)
                              DispatchQueue.main.async { 
                                  self.downloadFileName = dest.lastPathComponent
                                  self.showDownloadAlert = true 
                              }
                          }
                          task.resume()
                      }
                  }
              }
          }

          struct WebViewUI: UIViewRepresentable {
              @ObservedObject var viewModel: WebViewModel
              @Binding var urlString: String
              
              func makeUIView(context: Context) -> WKWebView {
                  let webView = viewModel.webView
                  webView.navigationDelegate = context.coordinator
                  webView.uiDelegate = context.coordinator
                  if let url = URL(string: "https://google.com") { webView.load(URLRequest(url: url)) }
                  return webView
              }
              
              func updateUIView(_ uiView: WKWebView, context: Context) {}
              func makeCoordinator() -> Coordinator { Coordinator(self) }
              
              class Coordinator: NSObject, WKNavigationDelegate, WKUIDelegate {
                  var parent: WebViewUI
                  init(_ parent: WebViewUI) { self.parent = parent }
                  
                  func webView(_ webView: WKWebView, createWebViewWith configuration: WKWebViewConfiguration, for navigationAction: WKNavigationAction, windowFeatures: WKWindowFeatures) -> WKWebView? {
                      if navigationAction.targetFrame == nil { webView.load(navigationAction.request) }
                      return nil
                  }
                  
                  func webView(_ webView: WKWebView, didCommit navigation: WKNavigation!) {
                      parent.viewModel.canGoBack = webView.canGoBack
                      parent.viewModel.canGoForward = webView.canGoForward
                      if let currentURL = webView.url?.absoluteString { parent.urlString = currentURL }
                  }
                  
                  func webView(_ webView: WKWebView, decidePolicyFor navigationAction: WKNavigationAction, decisionHandler: @escaping (WKNavigationActionPolicy) -> Void) {
                      if let url = navigationAction.request.url {
                          if ["mp3", "m4a"].contains(url.pathExtension.lowercased()) {
                              let task = URLSession.shared.downloadTask(with: url) { localUrl, response, _ in
                                  guard let localUrl = localUrl else { return }
                                  let fm = FileManager.default
                                  let dest = fm.urls(for: .documentDirectory, in: .userDomainMask)[0].appendingPathComponent(response?.suggestedFilename ?? url.lastPathComponent)
                                  try? fm.moveItem(at: localUrl, to: dest)
                                  DispatchQueue.main.async { 
                                      self.parent.viewModel.downloadFileName = dest.lastPathComponent
                                      self.parent.viewModel.showDownloadAlert = true 
                                  }
                              }
                              task.resume()
                              decisionHandler(.cancel)
                              return
                          }
                      }
                      decisionHandler(.allow)
                  }
              }
          }
          EOF

      - name: Write UI Views Code
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/Views.swift
          import SwiftUI

          struct MainTabView: View {
              @EnvironmentObject var musicManager: MusicManager
              @State private var showFullPlayer = false
              
              var body: some View {
                  TabView {
                      LibraryView().tabItem { Label("Library", systemImage: "music.note.list") }
                      PlaylistsView().tabItem { Label("Playlists", systemImage: "music.mic") }
                      BrowserView().tabItem { Label("Browser", systemImage: "safari") }
                  }
                  .accentColor(.purple)
                  .safeAreaInset(edge: .bottom) {
                      if musicManager.currentSong != nil {
                          MiniPlayerView(showFullPlayer: $showFullPlayer)
                      }
                  }
                  .sheet(isPresented: $showFullPlayer) {
                      FullPlayerView()
                  }
              }
          }

          struct MiniPlayerView: View {
              @EnvironmentObject var musicManager: MusicManager
              @Binding var showFullPlayer: Bool
              var body: some View {
                  VStack(spacing: 0) {
                      Divider().background(Color.white.opacity(0.1))
                      HStack(spacing: 15) {
                          ZStack {
                              LinearGradient(gradient: Gradient(colors: [.purple, .blue]), startPoint: .topLeading, endPoint: .bottomTrailing)
                                  .frame(width: 45, height: 45)
                                  .cornerRadius(8)
                              Image(systemName: "music.note").foregroundColor(.white)
                          }
                          
                          Text(musicManager.currentSong?.title ?? "").font(.system(size: 16, weight: .semibold)).lineLimit(1)
                          
                          Spacer()
                          Button(action: { musicManager.togglePlayPause() }) {
                              Image(systemName: musicManager.isPlaying ? "pause.fill" : "play.fill").font(.title2).foregroundColor(.primary)
                          }.padding(.trailing)
                      }
                      .padding(.horizontal).padding(.vertical, 8)
                      .background(.ultraThinMaterial)
                      .onTapGesture { showFullPlayer = true }
                  }
              }
          }

          struct FullPlayerView: View {
              @EnvironmentObject var musicManager: MusicManager
              @Environment(\.dismiss) var dismiss
              var body: some View {
                  ZStack {
                      LinearGradient(gradient: Gradient(colors: [Color(red: 0.1, green: 0.1, blue: 0.2), Color(red: 0.3, green: 0.1, blue: 0.4)]), startPoint: .top, endPoint: .bottom).edgesIgnoringSafeArea(.all)
                      
                      VStack(spacing: 40) {
                          HStack {
                              Button(action: { dismiss() }) { Image(systemName: "chevron.down").font(.title2).foregroundColor(.white) }
                              Spacer()
                              VStack(spacing: 2) {
                                  Text("NOW PLAYING").font(.caption).bold().foregroundColor(.white.opacity(0.6))
                                  Text("Ahmed's Music").font(.subheadline).bold().foregroundColor(.white)
                              }
                              Spacer()
                              Button(action: {}) { Image(systemName: "ellipsis").foregroundColor(.clear) }
                          }.padding()
                          
                          ZStack {
                              RoundedRectangle(cornerRadius: 30)
                                  .fill(LinearGradient(gradient: Gradient(colors: [.blue, .purple]), startPoint: .topLeading, endPoint: .bottomTrailing))
                                  .frame(width: 280, height: 280)
                                  .shadow(color: .purple.opacity(0.4), radius: 20, x: 0, y: 15)
                              
                              Image(systemName: "music.note.list").resizable().aspectRatio(contentMode: .fit).frame(width: 100, height: 100).foregroundColor(.white.opacity(0.8))
                          }.padding(.top, 20)
                          
                          VStack(spacing: 8) {
                              Text(musicManager.currentSong?.title ?? "Unknown").font(.system(size: 24, weight: .bold)).foregroundColor(.white).multilineTextAlignment(.center).padding(.horizontal)
                              Text("Downloaded from Web").font(.subheadline).foregroundColor(.white.opacity(0.6))
                          }
                          
                          HStack(spacing: 30) {
                              Button(action: { musicManager.isShuffle.toggle() }) {
                                  Image(systemName: "shuffle").font(.title2).foregroundColor(musicManager.isShuffle ? .purple : .white.opacity(0.5))
                              }
                              Button(action: { musicManager.playPrevious() }) {
                                  Image(systemName: "backward.fill").font(.title).foregroundColor(.white)
                              }
                              Button(action: { musicManager.togglePlayPause() }) {
                                  ZStack {
                                      Circle().fill(Color.white).frame(width: 80, height: 80)
                                      Image(systemName: musicManager.isPlaying ? "pause.fill" : "play.fill").resizable().aspectRatio(contentMode: .fit).frame(width: 30, height: 30).foregroundColor(.black)
                                  }
                              }
                              Button(action: { musicManager.playNext() }) {
                                  Image(systemName: "forward.fill").font(.title).foregroundColor(.white)
                              }
                              Button(action: { }) {
                                  Image(systemName: "repeat").font(.title2).foregroundColor(.white.opacity(0.5))
                              }
                          }.padding(.top, 20)
                          Spacer()
                      }
                  }
              }
          }

          struct LibraryView: View {
              @EnvironmentObject var musicManager: MusicManager
              @State private var showingOptionsFor: Song?
              var body: some View {
                  NavigationView {
                      List {
                          ForEach(musicManager.songs) { song in
                              HStack {
                                  VStack(alignment: .leading) { Text(song.title).font(.headline) }
                                  Spacer()
                                  Button(action: { showingOptionsFor = song }) { Image(systemName: "ellipsis") }
                              }
                              .contentShape(Rectangle())
                              .onTapGesture { musicManager.playSong(song) }
                          }
                          .onDelete { indexSet in indexSet.forEach { index in musicManager.deleteSong(musicManager.songs[index]) } }
                      }
                      .navigationTitle("Ahmed's Library")
                      .onAppear { musicManager.loadSongs() }
                      .actionSheet(item: $showingOptionsFor) { song in
                          var buttons: [ActionSheet.Button] = musicManager.playlists.map { playlist in
                              .default(Text("Add to \(playlist.name)")) { musicManager.addSongToPlaylist(song: song, playlist: playlist) }
                          }
                          buttons.append(.cancel())
                          return ActionSheet(title: Text("Options"), buttons: buttons)
                      }
                  }
              }
          }

          struct PlaylistDetailView: View {
              @EnvironmentObject var musicManager: MusicManager
              var playlist: Playlist
              var songsInPlaylist: [Song] { musicManager.songs.filter { playlist.songIDs.contains($0.id) } }
              var body: some View {
                  List {
                      ForEach(songsInPlaylist) { song in Text(song.title).onTapGesture { musicManager.playSong(song) } }
                  }.navigationTitle(playlist.name)
              }
          }

          struct PlaylistsView: View {
              @EnvironmentObject var musicManager: MusicManager
              @State private var showingNewPlaylist = false
              @State private var newPlaylistName = ""
              var body: some View {
                  NavigationView {
                      List {
                          ForEach(musicManager.playlists) { playlist in 
                              NavigationLink(destination: PlaylistDetailView(playlist: playlist)) { Text(playlist.name).font(.headline) }
                          }
                      }
                      .navigationTitle("Playlists")
                      .toolbar { Button(action: { showingNewPlaylist = true }) { Image(systemName: "plus") } }
                      .alert("New Playlist", isPresented: $showingNewPlaylist) {
                          TextField("Playlist Name", text: $newPlaylistName)
                          Button("Create") { if !newPlaylistName.isEmpty { musicManager.createPlaylist(name: newPlaylistName); newPlaylistName = "" } }
                          Button("Cancel", role: .cancel) { }
                      }
                  }
              }
          }

          struct BrowserView: View {
              @EnvironmentObject var musicManager: MusicManager
              @StateObject var webViewModel = WebViewModel()
              @State private var urlString = "https://google.com"
              
              var body: some View {
                  VStack(spacing: 0) {
                      HStack {
                          TextField("Search or enter website", text: $urlString).textFieldStyle(RoundedBorderTextFieldStyle()).keyboardType(.URL).autocapitalization(.none)
                          Button("Go") { webViewModel.loadUrl(urlString) }
                      }.padding(8).background(Color(UIColor.secondarySystemBackground))
                      
                      ScrollView(.horizontal, showsIndicators: false) {
                          HStack {
                              Button("Sm3na") { webViewModel.loadUrl("https://sm3na.com") }.buttonStyle(.borderedProminent).tint(.purple)
                              Button("Nogomi") { webViewModel.loadUrl("https://nogomistars.com") }.buttonStyle(.borderedProminent).tint(.blue)
                              Button("YtMP3") { webViewModel.loadUrl("https://ytmp3.cc") }.buttonStyle(.borderedProminent).tint(.red)
                          }.padding(.horizontal).padding(.bottom, 8)
                      }.background(Color(UIColor.secondarySystemBackground))
                      
                      WebViewUI(viewModel: webViewModel, urlString: $urlString)
                      
                      HStack {
                          Button(action: { webViewModel.goBack() }) { Image(systemName: "chevron.backward").font(.title2) }.disabled(!webViewModel.canGoBack)
                          Spacer()
                          Button(action: { webViewModel.goForward() }) { Image(systemName: "chevron.forward").font(.title2) }.disabled(!webViewModel.canGoForward)
                          Spacer()
                          Button(action: { webViewModel.grabAudio() }) { 
                              HStack {
                                  Image(systemName: "arrow.down.circle.fill")
                                  Text("Grab Audio")
                              }.font(.subheadline).bold().padding(.horizontal, 10).padding(.vertical, 5).background(Color.purple).foregroundColor(.white).cornerRadius(15)
                          }
                          Spacer()
                          Button(action: { webViewModel.refresh() }) { Image(systemName: "arrow.clockwise").font(.title2) }
                      }.padding().background(Color(UIColor.secondarySystemBackground))
                  }
                  .alert("Download Complete", isPresented: $webViewModel.showDownloadAlert) {
                      Button("OK", role: .cancel) { musicManager.loadSongs() }
                  } message: {
                      Text("Saved \(webViewModel.downloadFileName)")
                  }
              }
          }
          EOF

      - name: Write Plist & Project
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TrollMusicApp</string>
              <key>CFBundleIdentifier</key><string>com.ahmedsoliman.trollmusic</string>
              <key>CFBundleName</key><string>AhmedsMusic</string>
              <key>CFBundleShortVersionString</key><string>2.1</string>
              <key>CFBundleVersion</key><string>3</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
              <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF
          
          cd TrollMusicApp
          brew install xcodegen
          cat << 'EOF' > project.yml
          name: TrollMusicApp
          options:
            bundleIdPrefix: com.ahmedsoliman
          targets:
            TrollMusicApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: [TrollMusicApp]
              info:
                path: TrollMusicApp/Info.plist
              settings:
                CODE_SIGNING_ALLOWED: "NO"
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGN_IDENTITY: ""
          EOF
          xcodegen generate

      - name: Build & Package IPA
        run: |
          cd TrollMusicApp
          xcodebuild archive -project TrollMusicApp.xcodeproj -scheme TrollMusicApp -archivePath build/TrollMusicApp.xcarchive -configuration Release -destination 'generic/platform=iOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r build/TrollMusicApp.xcarchive/Products/Applications/TrollMusicApp.app Payload/
          zip -r TrollMusicApp.ipa Payload

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollMusicApp-Ahmed-Ultimate
          path: TrollMusicApp/TrollMusicApp.ipa
