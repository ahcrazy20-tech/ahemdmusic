name: Build TrollMusicApp V9.0

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Full IPA
    runs-on: macos-latest

    steps:
      - name: Setup Folders
        run: |
          mkdir -p TrollMusicApp/TrollMusicApp

      - name: Write Main App Code & AppDelegate
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/TrollMusicAppApp.swift
          import SwiftUI
          import AVFoundation

          class AppDelegate: NSObject, UIApplicationDelegate {
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey : Any]? = nil) -> Bool {
                  do {
                      try AVAudioSession.sharedInstance().setCategory(.playback, mode: .default, policy: .longFormAudio)
                      try AVAudioSession.sharedInstance().setActive(true)
                      UIApplication.shared.beginReceivingRemoteControlEvents()
                  } catch { print("Background Audio Setup Failed") }
                  return true
              }
          }

          @main
          struct TrollMusicAppApp: App {
              @UIApplicationDelegateAdaptor(AppDelegate.self) var appDelegate
              var body: some Scene {
                  WindowGroup {
                      MainTabView().environmentObject(MusicManager.shared)
                  }
              }
          }
          EOF

      - name: Write Music Manager Code (Spotify Features)
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/MusicManager.swift
          import Foundation
          import AVFoundation
          import MediaPlayer
          import SwiftUI

          class MusicManager: NSObject, ObservableObject {
              static let shared = MusicManager()
              @Published var songs: [Song] = []
              @Published var playlists: [Playlist] = []
              @Published var currentSong: Song?
              @Published var isPlaying: Bool = false
              @Published var isShuffle: Bool = false
              @Published var sleepTimerMinutes: Int = 0
              
              var player: AVPlayer?
              var timeObserverToken: Any?
              var sleepTimer: Timer?
              
              let fileManager = FileManager.default
              var documentsDirectory: URL { fileManager.urls(for: .documentDirectory, in: .userDomainMask)[0] }
              
              override init() {
                  super.init()
                  loadSongs(); loadPlaylists(); setupRemoteCommandCenter()
              }
              
              func loadSongs() {
                  do {
                      let files = try fileManager.contentsOfDirectory(at: documentsDirectory, includingPropertiesForKeys: nil)
                      let audioFiles = files.filter { ["mp3", "m4a", "wav"].contains($0.pathExtension.lowercased()) }
                      DispatchQueue.main.async {
                          self.songs = audioFiles.map { url in Song(id: UUID(), title: url.deletingPathExtension().lastPathComponent, url: url) }.sorted { $0.title < $1.title }
                      }
                  } catch {}
              }
              
              func deleteSong(_ song: Song) {
                  try? fileManager.removeItem(at: song.url)
                  loadSongs()
              }
              
              // MARK: - Playlists & Favorites (Spotify Style)
              func createPlaylist(name: String) {
                  playlists.append(Playlist(id: UUID(), name: name, songIDs: []))
                  savePlaylists()
              }
              
              func addSongToPlaylist(song: Song, playlist: Playlist) {
                  if let index = playlists.firstIndex(where: { $0.id == playlist.id }) {
                      if !playlists[index].songIDs.contains(song.id) { playlists[index].songIDs.append(song.id); savePlaylists() }
                  }
              }
              
              func toggleFavorite(song: Song) {
                  if playlists.isEmpty || playlists[0].name != "Liked Songs" {
                      playlists.insert(Playlist(id: UUID(), name: "Liked Songs", songIDs: []), at: 0)
                  }
                  if playlists[0].songIDs.contains(song.id) {
                      playlists[0].songIDs.removeAll { $0 == song.id }
                  } else {
                      playlists[0].songIDs.append(song.id)
                  }
                  savePlaylists()
                  // Force UI update
                  self.objectWillChange.send()
              }
              
              func isFavorite(song: Song) -> Bool {
                  guard !playlists.isEmpty, playlists[0].name == "Liked Songs" else { return false }
                  return playlists[0].songIDs.contains(song.id)
              }
              
              func savePlaylists() {
                  if let encoded = try? JSONEncoder().encode(playlists) { UserDefaults.standard.set(encoded, forKey: "savedPlaylists") }
              }
              
              func loadPlaylists() {
                  if let data = UserDefaults.standard.data(forKey: "savedPlaylists"), let decoded = try? JSONDecoder().decode([Playlist].self, from: data) {
                      playlists = decoded
                  }
                  if playlists.isEmpty || playlists[0].name != "Liked Songs" {
                      playlists.insert(Playlist(id: UUID(), name: "Liked Songs", songIDs: []), at: 0)
                      savePlaylists()
                  }
              }
              
              // MARK: - Sleep Timer
              func setSleepTimer(minutes: Int) {
                  sleepTimerMinutes = minutes
                  sleepTimer?.invalidate()
                  if minutes > 0 {
                      sleepTimer = Timer.scheduledTimer(withTimeInterval: TimeInterval(minutes * 60), repeats: false) { _ in
                          DispatchQueue.main.async {
                              self.player?.pause()
                              self.isPlaying = false
                              self.sleepTimerMinutes = 0
                          }
                      }
                  }
              }
              
              // MARK: - Audio Engine (Guaranteed Background Fix)
              func playSong(_ song: Song) {
                  do {
                      try AVAudioSession.sharedInstance().setCategory(.playback, mode: .default)
                      try AVAudioSession.sharedInstance().setActive(true)
                      
                      if let token = timeObserverToken {
                          player?.removeTimeObserver(token)
                          timeObserverToken = nil
                      }
                      player?.pause()
                      NotificationCenter.default.removeObserver(self, name: .AVPlayerItemDidPlayToEndTime, object: nil)
                      
                      let playerItem = AVPlayerItem(url: song.url)
                      player = AVPlayer(playerItem: playerItem)
                      player?.audiovisualBackgroundPlaybackPolicy = .continuesIfPossible // NEW iOS 15+ Fix
                      
                      DispatchQueue.main.asyncAfter(deadline: .now() + 0.1) {
                          self.player?.play()
                          self.currentSong = song
                          self.isPlaying = true
                          self.updateNowPlayingInfo()
                      }
                      
                      NotificationCenter.default.addObserver(self, selector: #selector(songFinished), name: .AVPlayerItemDidPlayToEndTime, object: playerItem)
                  } catch {}
              }
              
              @objc func songFinished() { DispatchQueue.main.async { self.playNext() } }
              
              func togglePlayPause() {
                  if isPlaying { player?.pause() } else { player?.play() }
                  isPlaying.toggle()
                  updateNowPlayingInfo()
              }
              
              func playNext() {
                  guard !songs.isEmpty else { return }
                  if isShuffle {
                      if let randomSong = songs.randomElement() { playSong(randomSong) }
                  } else {
                      guard let current = currentSong, let index = songs.firstIndex(of: current) else { return }
                      let nextIndex = (index + 1) % songs.count
                      playSong(songs[nextIndex])
                  }
              }
              
              func playPrevious() {
                  guard !songs.isEmpty else { return }
                  if isShuffle {
                      if let randomSong = songs.randomElement() { playSong(randomSong) }
                  } else {
                      guard let current = currentSong, let index = songs.firstIndex(of: current) else { return }
                      let prevIndex = (index - 1 + songs.count) % songs.count
                      playSong(songs[prevIndex])
                  }
              }
              
              func setupRemoteCommandCenter() {
                  let commandCenter = MPRemoteCommandCenter.shared()
                  commandCenter.playCommand.addTarget { [weak self] _ in guard let self = self else { return .commandFailed }; if self.isPlaying { return .commandFailed }; self.togglePlayPause(); return .success }
                  commandCenter.pauseCommand.addTarget { [weak self] _ in guard let self = self else { return .commandFailed }; if !self.isPlaying { return .commandFailed }; self.togglePlayPause(); return .success }
                  commandCenter.nextTrackCommand.addTarget { [weak self] _ in self?.playNext(); return .success }
                  commandCenter.previousTrackCommand.addTarget { [weak self] _ in self?.playPrevious(); return .success }
              }
              
              func updateNowPlayingInfo() {
                  guard let currentSong = currentSong else { return }
                  MPNowPlayingInfoCenter.default().nowPlayingInfo = [MPMediaItemPropertyTitle: currentSong.title, MPMediaItemPropertyArtist: "Ahmed's Music"]
              }
          }

          struct Song: Identifiable, Codable, Equatable { var id: UUID; var title: String; var url: URL }
          struct Playlist: Identifiable, Codable { var id: UUID; var name: String; var songIDs: [UUID] }
          EOF

      - name: Write Smart Downloader API (Unrestricted Wuk.sh Instance)
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/SmartDownloader.swift
          import SwiftUI

          struct CobaltResponse: Codable {
              var status: String?
              var url: String?
              var text: String?
          }

          class SmartDownloaderManager: ObservableObject {
              @Published var isDownloading = false
              @Published var statusMessage = ""
              @Published var showSuccess = false
              @Published var showError = false
              @Published var errorDetails = ""
              
              func downloadFromLink(url: String, name: String) {
                  guard !url.isEmpty else { return }
                  isDownloading = true
                  statusMessage = "Bypassing Security & Analyzing Link..."
                  
                  // Using unrestricted public Cobalt instance to avoid blocked requests
                  guard let apiUrl = URL(string: "https://co.wuk.sh/api/json") else { return }
                  var request = URLRequest(url: apiUrl)
                  request.httpMethod = "POST"
                  request.setValue("application/json", forHTTPHeaderField: "Accept")
                  request.setValue("application/json", forHTTPHeaderField: "Content-Type")
                  
                  let parameters: [String: Any] = ["url": url, "isAudioOnly": true, "aFormat": "mp3"]
                  request.httpBody = try? JSONSerialization.data(withJSONObject: parameters)
                  
                  URLSession.shared.dataTask(with: request) { data, response, error in
                      guard let data = data, let res = try? JSONDecoder().decode(CobaltResponse.self, from: data), let audioUrlStr = res.url, let audioUrl = URL(string: audioUrlStr) else {
                          DispatchQueue.main.async { 
                              self.errorDetails = "Failed to parse stream. The video might be private or blocked."
                              self.isDownloading = false; self.showError = true 
                          }
                          return
                      }
                      
                      DispatchQueue.main.async { self.statusMessage = "Downloading High-Quality MP3..." }
                      
                      let task = URLSession.shared.downloadTask(with: audioUrl) { localUrl, response, _ in
                          guard let localUrl = localUrl else {
                              DispatchQueue.main.async { self.isDownloading = false; self.showError = true }
                              return
                          }
                          let finalName = name.isEmpty ? "SmartDownload_\(UUID().uuidString.prefix(4))" : name
                          let fm = FileManager.default
                          let destDir = fm.urls(for: .documentDirectory, in: .userDomainMask)[0]
                          let destPath = destDir.appendingPathComponent("\(finalName).mp3")
                          try? fm.moveItem(at: localUrl, to: destPath)
                          
                          DispatchQueue.main.async {
                              self.isDownloading = false
                              self.showSuccess = true
                              MusicManager.shared.loadSongs()
                          }
                      }
                      task.resume()
                  }.resume()
              }
          }

          struct SmartDownloaderView: View {
              @StateObject var downloader = SmartDownloaderManager()
              @State private var linkInput = ""
              @State private var nameInput = ""
              
              var body: some View {
                  NavigationView {
                      ZStack {
                          Color(uiColor: .systemGroupedBackground).edgesIgnoringSafeArea(.all)
                          
                          VStack(spacing: 30) {
                              Image(systemName: "bolt.horizontal.circle.fill").resizable().frame(width: 80, height: 80).foregroundColor(.purple).padding(.top, 40)
                              Text("Smart DL Engine").font(.title).bold()
                              Text("Paste a public link from YouTube, TikTok, or Twitter. The app will bypass restrictions and download the MP3 directly!")
                                  .multilineTextAlignment(.center).foregroundColor(.gray).padding(.horizontal)
                              
                              VStack(spacing: 15) {
                                  TextField("Paste Link Here...", text: $linkInput).padding().background(Color(uiColor: .secondarySystemGroupedBackground)).cornerRadius(12)
                                  TextField("Save As (Name of Song)", text: $nameInput).padding().background(Color(uiColor: .secondarySystemGroupedBackground)).cornerRadius(12)
                              }.padding(.horizontal)
                              
                              if downloader.isDownloading {
                                  VStack { ProgressView(); Text(downloader.statusMessage).font(.caption).foregroundColor(.gray).padding(.top, 5) }
                              } else {
                                  Button(action: { downloader.downloadFromLink(url: linkInput, name: nameInput) }) {
                                      Text("Extract MP3").font(.headline).foregroundColor(.white).frame(maxWidth: .infinity).padding().background(LinearGradient(gradient: Gradient(colors: [.purple, .blue]), startPoint: .leading, endPoint: .trailing)).cornerRadius(12)
                                  }.padding(.horizontal)
                              }
                              Spacer()
                          }
                      }
                      .navigationTitle("Smart Download")
                      .navigationBarTitleDisplayMode(.inline)
                      .alert("Download Complete", isPresented: $downloader.showSuccess) { Button("Awesome!", role: .cancel) { linkInput = ""; nameInput = "" } } message: { Text("Saved to your Library!") }
                      .alert("Error", isPresented: $downloader.showError) { Button("OK", role: .cancel) { } } message: { Text(downloader.errorDetails) }
                  }
              }
          }
          EOF

      - name: Write Web Browser Logic
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/WebBrowser.swift
          import SwiftUI
          import WebKit
          // Kept basic browser code from previous versions
          struct BrowserTab: Identifiable { let id = UUID(); var webView: WKWebView; var urlString: String; var title: String }
          class WebViewModel: ObservableObject {
              @Published var tabs: [BrowserTab] = []
              @Published var currentTabIndex: Int = 0
              @Published var showTabs: Bool = false
              @Published var canGoBack: Bool = false
              @Published var canGoForward: Bool = false
              @Published var showDownloadAlert: Bool = false
              @Published var showNamePrompt: Bool = false
              @Published var downloadFileName: String = ""
              @Published var customSongName: String = ""
              var capturedUrl: URL? = nil
              init() { addNewTab() }
              var currentWebView: WKWebView { tabs[currentTabIndex].webView }
              func addNewTab() {
                  let prefs = WKWebpagePreferences()
                  prefs.allowsContentJavaScript = true
                  let config = WKWebViewConfiguration()
                  config.defaultWebpagePreferences = prefs
                  config.allowsInlineMediaPlayback = true
                  let newWebView = WKWebView(frame: .zero, configuration: config)
                  newWebView.configuration.preferences.javaScriptCanOpenWindowsAutomatically = false
                  tabs.append(BrowserTab(webView: newWebView, urlString: "https://google.com", title: "New Tab"))
                  currentTabIndex = tabs.count - 1
                  loadUrl("https://google.com")
              }
              func closeTab(at index: Int) { tabs.remove(at: index); if tabs.isEmpty { addNewTab() } else if currentTabIndex >= tabs.count { currentTabIndex = tabs.count - 1 } }
              func goBack() { currentWebView.goBack() }
              func goForward() { currentWebView.goForward() }
              func refresh() { currentWebView.reload() }
              func loadUrl(_ urlString: String) { var finalStr = urlString; if !finalStr.hasPrefix("http") { finalStr = "https://" + finalStr }; if let url = URL(string: finalStr) { currentWebView.load(URLRequest(url: url)) } }
              func grabAudio() {
                  let js = "(function() { var media = document.querySelector('video') || document.querySelector('audio'); if (media && media.src) return media.src; var source = document.querySelector('source'); if (source && source.src) return source.src; return null; })()"
                  currentWebView.evaluateJavaScript(js) { result, error in
                      if let mediaUrlString = result as? String, let url = URL(string: mediaUrlString) { self.capturedUrl = url; self.customSongName = ""; self.showNamePrompt = true }
                  }
              }
              func confirmDownload(with name: String) {
                  guard let url = capturedUrl else { return }
                  let finalName = name.isEmpty ? "CapturedAudio_\(UUID().uuidString.prefix(4))" : name
                  let destDir = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0]
                  URLSession.shared.downloadTask(with: url) { localUrl, response, _ in
                      guard let localUrl = localUrl else { return }
                      let destPath = destDir.appendingPathComponent("\(finalName).mp3")
                      try? FileManager.default.moveItem(at: localUrl, to: destPath)
                      DispatchQueue.main.async { self.downloadFileName = destPath.lastPathComponent; self.showDownloadAlert = true }
                  }.resume()
              }
          }
          struct WebViewUI: UIViewRepresentable {
              @ObservedObject var viewModel: WebViewModel
              @Binding var urlString: String
              func makeUIView(context: Context) -> WKWebView { return viewModel.currentWebView }
              func updateUIView(_ uiView: WKWebView, context: Context) { uiView.navigationDelegate = context.coordinator; uiView.uiDelegate = context.coordinator }
              func makeCoordinator() -> Coordinator { Coordinator(self) }
              class Coordinator: NSObject, WKNavigationDelegate, WKUIDelegate {
                  var parent: WebViewUI
                  init(_ parent: WebViewUI) { self.parent = parent }
                  func webView(_ webView: WKWebView, createWebViewWith configuration: WKWebViewConfiguration, for navigationAction: WKNavigationAction, windowFeatures: WKWindowFeatures) -> WKWebView? {
                      if navigationAction.targetFrame == nil { webView.load(navigationAction.request) }
                      return nil
                  }
                  func webView(_ webView: WKWebView, didCommit navigation: WKNavigation!) {
                      parent.viewModel.canGoBack = webView.canGoBack; parent.viewModel.canGoForward = webView.canGoForward
                      if let currentURL = webView.url?.absoluteString { parent.urlString = currentURL; parent.viewModel.tabs[parent.viewModel.currentTabIndex].urlString = currentURL }
                  }
              }
          }
          EOF

      - name: Write UI Views Code (Spotify Design)
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/Views.swift
          import SwiftUI

          // Helper to generate Spotify-style unique colors based on Song Title!
          func generateColor(for title: String) -> Color {
              let hash = abs(title.hashValue)
              return Color(hue: Double(hash % 100) / 100.0, saturation: 0.8, brightness: 0.7)
          }

          struct VisualizerView: View {
              @State private var isAnimating = false
              var body: some View {
                  HStack(spacing: 4) {
                      ForEach(0..<4) { i in
                          Capsule().fill(Color.white)
                              .frame(width: 4, height: isAnimating ? CGFloat.random(in: 10...25) : 5)
                              .animation(Animation.linear(duration: 0.3).repeatForever().delay(0.1 * Double(i)), value: isAnimating)
                      }
                  }.onAppear { isAnimating = true }
              }
          }

          struct MainTabView: View {
              @EnvironmentObject var musicManager: MusicManager
              @State private var showFullPlayer = false
              var body: some View {
                  ZStack(alignment: .bottom) {
                      TabView {
                          LibraryView().tabItem { Label("Library", systemImage: "music.note.list") }
                          PlaylistsView().tabItem { Label("Playlists", systemImage: "music.mic") }
                          SmartDownloaderView().tabItem { Label("Smart DL", systemImage: "bolt.fill") }
                          BrowserMainView().tabItem { Label("Browser", systemImage: "safari") }
                      }.accentColor(.purple)
                      if musicManager.currentSong != nil { MiniPlayerView(showFullPlayer: $showFullPlayer).padding(.bottom, 50) }
                  }.sheet(isPresented: $showFullPlayer) { FullPlayerView() }
              }
          }

          struct MiniPlayerView: View {
              @EnvironmentObject var musicManager: MusicManager
              @Binding var showFullPlayer: Bool
              var body: some View {
                  VStack(spacing: 0) {
                      Divider().background(Color.white.opacity(0.1))
                      HStack(spacing: 15) {
                          ZStack {
                              generateColor(for: musicManager.currentSong?.title ?? "").frame(width: 45, height: 45).cornerRadius(8)
                              Image(systemName: "music.note").foregroundColor(.white)
                          }
                          VStack(alignment: .leading) {
                              Text(musicManager.currentSong?.title ?? "").font(.system(size: 16, weight: .semibold)).lineLimit(1)
                              Text("Ahmed's Music").font(.caption).foregroundColor(.gray)
                          }
                          Spacer()
                          Button(action: { musicManager.togglePlayPause() }) { Image(systemName: musicManager.isPlaying ? "pause.fill" : "play.fill").font(.title2).foregroundColor(.primary) }.padding(.trailing)
                      }.padding(.horizontal).padding(.vertical, 8).background(.ultraThinMaterial).onTapGesture { showFullPlayer = true }
                  }
              }
          }

          struct FullPlayerView: View {
              @EnvironmentObject var musicManager: MusicManager
              @Environment(\.dismiss) var dismiss
              @State private var showTimerOptions = false
              
              var body: some View {
                  ZStack {
                      // Spotify Style Gradient Background based on Song Name
                      LinearGradient(gradient: Gradient(colors: [generateColor(for: musicManager.currentSong?.title ?? "Unknown"), Color.black]), startPoint: .top, endPoint: .bottom).edgesIgnoringSafeArea(.all)
                      
                      VStack(spacing: 40) {
                          HStack {
                              Button(action: { dismiss() }) { Image(systemName: "chevron.down").font(.title2).foregroundColor(.white) }
                              Spacer()
                              VStack(spacing: 2) {
                                  Text(musicManager.playlists.first?.name == "Liked Songs" && musicManager.isFavorite(song: musicManager.currentSong!) ? "FROM LIKED SONGS" : "NOW PLAYING").font(.caption).bold().foregroundColor(.white.opacity(0.6))
                                  Text("Ahmed's Music").font(.subheadline).bold().foregroundColor(.white)
                              }
                              Spacer()
                              Button(action: { showTimerOptions = true }) { Image(systemName: "moon.fill").foregroundColor(musicManager.sleepTimerMinutes > 0 ? .purple : .white) }
                          }.padding()
                          
                          ZStack {
                              RoundedRectangle(cornerRadius: 15).fill(generateColor(for: musicManager.currentSong?.title ?? "")).frame(width: 320, height: 320).shadow(color: .black.opacity(0.5), radius: 20, x: 0, y: 15)
                              Image(systemName: "music.note").resizable().aspectRatio(contentMode: .fit).frame(width: 100, height: 100).foregroundColor(.white.opacity(0.8))
                          }.padding(.top, 10)
                          
                          HStack {
                              VStack(alignment: .leading, spacing: 8) {
                                  Text(musicManager.currentSong?.title ?? "Unknown").font(.system(size: 26, weight: .bold)).foregroundColor(.white).lineLimit(2)
                                  HStack {
                                      Text("Downloaded Track").font(.subheadline).foregroundColor(.white.opacity(0.6))
                                      if musicManager.isPlaying { VisualizerView().padding(.leading, 5) }
                                  }
                              }
                              Spacer()
                              if let song = musicManager.currentSong {
                                  Button(action: { musicManager.toggleFavorite(song: song) }) {
                                      Image(systemName: musicManager.isFavorite(song: song) ? "heart.fill" : "heart").font(.title).foregroundColor(musicManager.isFavorite(song: song) ? .green : .white)
                                  }
                              }
                          }.padding(.horizontal, 30)
                          
                          HStack(spacing: 40) {
                              Button(action: { musicManager.isShuffle.toggle() }) { Image(systemName: "shuffle").font(.title2).foregroundColor(musicManager.isShuffle ? .green : .white.opacity(0.5)) }
                              Button(action: { musicManager.playPrevious() }) { Image(systemName: "backward.fill").font(.system(size: 35)).foregroundColor(.white) }
                              Button(action: { musicManager.togglePlayPause() }) {
                                  ZStack { Circle().fill(Color.white).frame(width: 80, height: 80); Image(systemName: musicManager.isPlaying ? "pause.fill" : "play.fill").resizable().aspectRatio(contentMode: .fit).frame(width: 30, height: 30).foregroundColor(.black) }
                              }
                              Button(action: { musicManager.playNext() }) { Image(systemName: "forward.fill").font(.system(size: 35)).foregroundColor(.white) }
                              Button(action: { }) { Image(systemName: "repeat").font(.title2).foregroundColor(.white.opacity(0.5)) }
                          }.padding(.top, 10)
                          
                          if musicManager.sleepTimerMinutes > 0 { Text("Timer: \(musicManager.sleepTimerMinutes) mins").font(.caption).foregroundColor(.gray) }
                          Spacer()
                      }
                  }
                  .actionSheet(isPresented: $showTimerOptions) {
                      ActionSheet(title: Text("Sleep Timer"), buttons: [
                          .default(Text("15 Minutes")) { musicManager.setSleepTimer(minutes: 15) },
                          .default(Text("30 Minutes")) { musicManager.setSleepTimer(minutes: 30) },
                          .default(Text("60 Minutes")) { musicManager.setSleepTimer(minutes: 60) },
                          .destructive(Text("Turn Off Timer")) { musicManager.setSleepTimer(minutes: 0) },
                          .cancel()
                      ])
                  }
              }
          }

          struct LibraryView: View {
              @EnvironmentObject var musicManager: MusicManager
              @State private var showingOptionsFor: Song?
              var body: some View {
                  NavigationView {
                      List {
                          ForEach(musicManager.songs) { song in
                              HStack {
                                  Button(action: { musicManager.playSong(song) }) {
                                      HStack {
                                          generateColor(for: song.title).frame(width: 40, height: 40).cornerRadius(5).overlay(Image(systemName: "music.note").foregroundColor(.white))
                                          VStack(alignment: .leading) { Text(song.title).font(.headline); Text("Ahmed's Music").font(.caption).foregroundColor(.gray) }
                                          Spacer()
                                      }.contentShape(Rectangle())
                                  }.buttonStyle(BorderlessButtonStyle())
                                  
                                  Button(action: { showingOptionsFor = song }) { Image(systemName: "ellipsis").padding() }.buttonStyle(BorderlessButtonStyle())
                              }
                          }.onDelete { indexSet in indexSet.forEach { index in musicManager.deleteSong(musicManager.songs[index]) } }
                      }
                      .navigationTitle("Your Library").onAppear { musicManager.loadSongs() }
                      .confirmationDialog("Options", isPresented: Binding(get: { showingOptionsFor != nil }, set: { if !$0 { showingOptionsFor = nil } }), titleVisibility: .visible) {
                          if let song = showingOptionsFor { ForEach(musicManager.playlists) { playlist in Button("Add to \(playlist.name)") { musicManager.addSongToPlaylist(song: song, playlist: playlist) } } }
                          Button("Cancel", role: .cancel) {}
                      }
                  }
              }
          }

          struct PlaylistDetailView: View {
              @EnvironmentObject var musicManager: MusicManager
              var playlist: Playlist
              var songsInPlaylist: [Song] { musicManager.songs.filter { playlist.songIDs.contains($0.id) } }
              var body: some View {
                  List {
                      ForEach(songsInPlaylist) { song in
                          Button(action: { musicManager.playSong(song) }) {
                              HStack { generateColor(for: song.title).frame(width: 40, height: 40).cornerRadius(5).overlay(Image(systemName: "music.note").foregroundColor(.white)); Text(song.title).foregroundColor(.primary); Spacer() }
                          }
                      }.onDelete { indexSet in
                          // Remove from playlist
                          if let pIndex = musicManager.playlists.firstIndex(where: { $0.id == playlist.id }) {
                              indexSet.forEach { musicManager.playlists[pIndex].songIDs.remove(at: $0) }
                              musicManager.savePlaylists()
                          }
                      }
                  }.navigationTitle(playlist.name)
              }
          }

          struct PlaylistsView: View {
              @EnvironmentObject var musicManager: MusicManager
              @State private var showingNewPlaylist = false
              @State private var newPlaylistName = ""
              var body: some View {
                  NavigationView {
                      List { ForEach(musicManager.playlists) { playlist in NavigationLink(destination: PlaylistDetailView(playlist: playlist)) { Text(playlist.name).font(.headline).padding(.vertical, 5) } } }
                      .navigationTitle("Playlists").toolbar { Button(action: { showingNewPlaylist = true }) { Image(systemName: "plus") } }
                      .alert("New Playlist", isPresented: $showingNewPlaylist) { TextField("Playlist Name", text: $newPlaylistName); Button("Create") { if !newPlaylistName.isEmpty { musicManager.createPlaylist(name: newPlaylistName); newPlaylistName = "" } }; Button("Cancel", role: .cancel) { } }
                  }
              }
          }
          
          struct BrowserMainView: View {
              @EnvironmentObject var musicManager: MusicManager
              @StateObject var webViewModel = WebViewModel()
              @State private var urlString = "https://google.com"
              
              var body: some View {
                  ZStack {
                      VStack(spacing: 0) {
                          HStack { TextField("Search or enter website", text: $urlString).textFieldStyle(RoundedBorderTextFieldStyle()).keyboardType(.URL).autocapitalization(.none); Button("Go") { webViewModel.loadUrl(urlString) } }.padding(8).background(Color(uiColor: .secondarySystemBackground))
                          ScrollView(.horizontal, showsIndicators: false) {
                              HStack { Button("Sm3na") { webViewModel.loadUrl("https://sm3na.com") }.buttonStyle(.borderedProminent).tint(.purple); Button("Nogomi") { webViewModel.loadUrl("https://nogomistars.com") }.buttonStyle(.borderedProminent).tint(.blue); Button("YtMP3") { webViewModel.loadUrl("https://ytmp3.cc") }.buttonStyle(.borderedProminent).tint(.red) }.padding(.horizontal).padding(.bottom, 8)
                          }.background(Color(uiColor: .secondarySystemBackground))
                          WebViewUI(viewModel: webViewModel, urlString: $urlString)
                          HStack {
                              Button(action: { webViewModel.goBack() }) { Image(systemName: "chevron.backward").font(.title2) }.disabled(!webViewModel.canGoBack); Spacer()
                              Button(action: { webViewModel.goForward() }) { Image(systemName: "chevron.forward").font(.title2) }.disabled(!webViewModel.canGoForward); Spacer()
                              Button(action: { webViewModel.grabAudio() }) { Image(systemName: "arrow.down.circle.fill").font(.title2).foregroundColor(.purple) }; Spacer()
                              Button(action: { webViewModel.showTabs = true }) { ZStack { RoundedRectangle(cornerRadius: 6).stroke(Color.primary, lineWidth: 2).frame(width: 24, height: 24); Text("\(webViewModel.tabs.count)").font(.caption).bold() } }; Spacer()
                              Button(action: { webViewModel.refresh() }) { Image(systemName: "arrow.clockwise").font(.title2) }
                          }.padding().background(Color(uiColor: .secondarySystemBackground))
                      }
                      if webViewModel.showTabs {
                          Color.black.opacity(0.8).edgesIgnoringSafeArea(.all)
                          VStack {
                              HStack { Text("Tabs").font(.title).bold().foregroundColor(.white); Spacer(); Button("Done") { webViewModel.showTabs = false }.foregroundColor(.blue) }.padding()
                              ScrollView { VStack(spacing: 15) { ForEach(0..<webViewModel.tabs.count, id: \.self) { index in HStack { VStack(alignment: .leading) { Text("Tab \(index + 1)").font(.headline).foregroundColor(.white); Text(webViewModel.tabs[index].urlString).font(.caption).foregroundColor(.gray).lineLimit(1) }; Spacer(); Button(action: { webViewModel.closeTab(at: index) }) { Image(systemName: "xmark.circle.fill").foregroundColor(.red).font(.title) } }.padding().background(webViewModel.currentTabIndex == index ? Color.purple.opacity(0.5) : Color.gray.opacity(0.3)).cornerRadius(10).onTapGesture { webViewModel.currentTabIndex = index; urlString = webViewModel.tabs[index].urlString; webViewModel.showTabs = false } }; Button(action: { webViewModel.addNewTab(); webViewModel.showTabs = false }) { HStack { Image(systemName: "plus"); Text("New Tab") }.font(.headline).foregroundColor(.white).padding().frame(maxWidth: .infinity).background(Color.blue).cornerRadius(10) }.padding(.top, 10) }.padding(.horizontal) }
                          }
                      }
                  }
                  .alert("Name Your Song", isPresented: $webViewModel.showNamePrompt) { TextField("Song Name", text: $webViewModel.customSongName); Button("Download") { webViewModel.confirmDownload(with: webViewModel.customSongName) }; Button("Cancel", role: .cancel) { } }
                  .alert("Cannot Download", isPresented: $webViewModel.showBlobError) { Button("OK", role: .cancel) { } } message: { Text("Try using the Smart DL tab instead!") }
                  .alert("Download Complete", isPresented: $webViewModel.showDownloadAlert) { Button("OK", role: .cancel) { musicManager.loadSongs() } } message: { Text("Saved \(webViewModel.downloadFileName)") }
              }
          }
          EOF

      - name: Write Plists, Entitlements & Xcode Configuration (CRITICAL BACKGROUND FIX)
        run: |
          cat << 'EOF' > TrollMusicApp/TrollMusicApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>TrollMusicApp</string>
              <key>CFBundleIdentifier</key><string>com.ahmedsoliman.trollmusic</string>
              <key>CFBundleName</key><string>AhmedsMusic</string>
              <key>CFBundleShortVersionString</key><string>9.0</string>
              <key>CFBundleVersion</key><string>15</string>
              <key>UIBackgroundModes</key><array><string>audio</string></array>
              <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
              <key>UILaunchScreen</key><dict/>
          </dict>
          </plist>
          EOF
          
          # APPLE REQUIRES THIS FILE TO ALLOW JAILED APPS TO RUN IN BACKGROUND
          cat << 'EOF' > TrollMusicApp/TrollMusicApp.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.background.audio</key><true/>
          </dict>
          </plist>
          EOF
          
          cd TrollMusicApp
          brew install xcodegen
          cat << 'EOF' > project.yml
          name: TrollMusicApp
          options:
            bundleIdPrefix: com.ahmedsoliman
          targets:
            TrollMusicApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: [TrollMusicApp]
              info:
                path: TrollMusicApp/Info.plist
              settings:
                CODE_SIGNING_ALLOWED: "NO"
                CODE_SIGNING_REQUIRED: "NO"
                CODE_SIGN_IDENTITY: ""
                # THIS LINE WAS MISSING IN V8. IT IS THE REASON BACKGROUND STOPPED!
                CODE_SIGN_ENTITLEMENTS: TrollMusicApp.entitlements
          EOF
          xcodegen generate

      - name: Build & Package IPA
        run: |
          cd TrollMusicApp
          xcodebuild archive -project TrollMusicApp.xcodeproj -scheme TrollMusicApp -archivePath build/TrollMusicApp.xcarchive -configuration Release -destination 'generic/platform=iOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          mkdir -p Payload
          cp -r build/TrollMusicApp.xcarchive/Products/Applications/TrollMusicApp.app Payload/
          zip -r TrollMusicApp.ipa Payload

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollMusicApp-Ahmed-Ultimate-SpotifyV9
          path: TrollMusicApp/TrollMusicApp.ipa
